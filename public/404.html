<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0;url=/#" />
    <script>
      (function() {
        var path = location.pathname + location.search + location.hash;
        // Redirect to index with hash preserving the original path
        location.replace('/#' + path);
      })();
    </script>
    <title>Redirecting…</title>
  </head>
  <body>
    Redirecting...
  </body>
</html>
